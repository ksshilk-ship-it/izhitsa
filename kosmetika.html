<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Косметика — Финансы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --kraft:#EDE4D3;
    --kraft-dark:#DCCFB4;
    --paper:#F7F2E7;
    --ink:#2B241A;
    --ink-soft:#6B6152;
    --brick:#AE4A2E;
    --brick-dark:#8E3B24;
    --green:#4C6B4F;
    --slate:#4E6C7A;
    --line:#C9BB9E;
    --white:#FFFDF8;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--kraft); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;}
  header{padding:22px 20px 14px; border-bottom:2px solid var(--ink); background:var(--paper);}
  header h1{font-family:'PT Serif',serif; font-size:1.5rem; margin:0 0 2px; letter-spacing:0.3px;}
  header .sub{font-size:0.78rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:1.5px;}
  nav{display:flex; overflow-x:auto; background:var(--kraft-dark); border-bottom:1px solid var(--line);}
  nav button{flex:0 0 auto; padding:12px 16px; background:none; border:none; font-family:'Inter',sans-serif; font-size:0.86rem; font-weight:600; color:var(--ink-soft); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap;}
  nav button.active{color:var(--brick-dark); border-bottom-color:var(--brick);}
  main{padding:16px; max-width:720px; margin:0 auto; padding-bottom:60px;}
  .card{background:var(--white); border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:14px;}
  .card h2{font-family:'PT Serif',serif; font-size:1.05rem; margin:0 0 12px; padding-bottom:8px; border-bottom:1px solid var(--line);}
  .row{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px;}
  .label{color:var(--ink-soft); font-size:0.85rem;}
  .num{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1rem;}
  .num.big{font-size:1.6rem;}
  .num.pos{color:var(--green);}
  .num.neg{color:var(--brick);}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px;}
  .stat{background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:10px 12px;}
  .stat .label{font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px;}
  .stat .num{display:block; margin-top:4px;}
  input, select, textarea{width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:6px; background:var(--paper); font-family:'Inter',sans-serif; font-size:0.9rem; color:var(--ink);}
  textarea{font-family:'IBM Plex Mono',monospace; font-size:0.8rem; min-height:80px;}
  label.field{display:block; font-size:0.78rem; color:var(--ink-soft); margin-bottom:4px; margin-top:10px;}
  button.btn{padding:10px 16px; border:none; border-radius:6px; background:var(--brick); color:var(--white); font-weight:600; font-size:0.88rem; cursor:pointer; margin-top:12px; margin-right:6px;}
  button.btn.secondary{background:none; border:1px solid var(--line); color:var(--ink-soft);}
  button.btn.small{padding:6px 10px; font-size:0.78rem; margin-top:8px;}
  button.btn.danger{background:var(--brick-dark);}
  table{width:100%; border-collapse:collapse; font-size:0.8rem;}
  th{text-align:left; font-size:0.66rem; text-transform:uppercase; color:var(--ink-soft); border-bottom:1px solid var(--line); padding:6px 3px;}
  td{padding:7px 3px; border-bottom:1px solid var(--kraft-dark); font-family:'IBM Plex Mono',monospace;}
  td.txt{font-family:'Inter',sans-serif;}
  .tag{display:inline-block; font-size:0.68rem; padding:2px 7px; border-radius:20px; background:var(--kraft-dark); color:var(--ink-soft); font-family:'Inter',sans-serif; font-weight:600; margin:2px 4px 2px 0;}
  .empty{color:var(--ink-soft); font-size:0.85rem; text-align:center; padding:16px 0;}
  .bar-row{display:flex; align-items:center; gap:8px; margin-bottom:5px;}
  .bar-label{width:64px; font-size:0.72rem; color:var(--ink-soft); flex:0 0 auto;}
  .bar-track{flex:1; background:var(--kraft-dark); border-radius:4px; height:14px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--brick); border-radius:4px;}
  .bar-val{width:70px; text-align:right; font-family:'IBM Plex Mono',monospace; font-size:0.75rem; flex:0 0 auto;}
  details summary{cursor:pointer; font-size:0.82rem; color:var(--brick-dark); font-weight:600; padding:4px 0; list-style:none;}
  details summary::-webkit-details-marker{display:none;}
  .del-x{background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:0.9rem; padding:0 4px;}
  .del-x:hover{color:var(--brick);}
  .icon-btn{background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:0.9rem; padding:0 4px;}
  .icon-btn:hover{color:var(--brick-dark);}
  .two-col{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .note{font-size:0.76rem; color:var(--ink-soft); margin-top:6px; line-height:1.4;}
  .chart-wrap{display:flex; gap:16px; overflow-x:auto; position:relative; padding-top:2px;}
  .chart-baseline{position:absolute; left:0; right:0; top:70px; height:1px; background:var(--ink); opacity:0.35; z-index:0;}
  .chart-col{display:flex; flex-direction:column; align-items:center; flex:0 0 auto;}
  .chart-bars{position:relative; height:140px; display:flex; gap:5px; align-items:flex-start; z-index:1;}
  .bar-slot{position:relative; width:14px; height:100%;}
  .bar{position:absolute; left:0; right:0; border-radius:2px 2px 0 0;}
  .bar.neg{border-radius:0 0 2px 2px;}
  .bar.fin.pos{background:var(--green);}
  .bar.fin.neg{background:var(--brick);}
  .bar.cash.pos{background:var(--slate); opacity:0.85;}
  .bar.cash.neg{background:var(--slate); opacity:0.5;}
  .chart-label{font-size:0.68rem; color:var(--ink-soft); margin-top:6px;}
  select.inline{width:auto; padding:4px 6px; font-size:0.76rem;}
  input.inline-date{width:110px; padding:4px 6px; font-size:0.76rem; display:inline-block;}
  .month-group{padding:10px 12px;}
  .month-summary{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:4px 10px; padding:4px 0 10px; cursor:pointer; font-family:'PT Serif',serif; font-size:1rem;}
  .month-summary .stats{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--ink-soft); font-weight:normal; text-align:right;}
  .cat-group-title{font-size:0.7rem; text-transform:uppercase; color:var(--ink-soft); letter-spacing:0.5px; margin:12px 0 4px; padding-top:8px; border-top:1px dashed var(--line);}
  .period-btns{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px;}
  .period-btns button{padding:6px 10px; font-size:0.74rem; border:1px solid var(--line); background:var(--paper); border-radius:20px; color:var(--ink-soft); cursor:pointer;}
  .cal-nav{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .cal-nav button{background:none; border:1px solid var(--line); border-radius:6px; padding:6px 12px; color:var(--ink-soft); cursor:pointer;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-cell{aspect-ratio:1/1; border-radius:6px; padding:4px; display:flex; flex-direction:column; justify-content:space-between; background:var(--paper); border:1px solid var(--line);}
  .cal-cell.empty{background:transparent; border:none;}
  .cal-cell .d{font-size:0.66rem; font-weight:600; color:var(--ink-soft);}
  .cal-cell .v{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:0.6rem;}
  .cal-cell.pos{background:#E3EBE3;}
  .cal-cell.neg{background:#F3E0D8;}
  .cal-cell.future{opacity:0.65; border-style:dashed;}
  .cal-legend{font-size:0.7rem; color:var(--ink-soft); margin-top:10px; line-height:1.6;}
  .preset-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
  .preset-chip{padding:4px 10px; font-size:0.74rem; border:1px solid var(--line); border-radius:20px; background:var(--paper); cursor:pointer; color:var(--ink-soft);}
</style>
</head>
<body>

<header>
  <h1>Косметика — Финансы</h1>
  <div class="sub">Касса · Маржа · Расходы</div>
</header>

<nav id="nav"></nav>
<main id="main"></main>

<script>
const TABS = [
  {id:'overview', label:'Обзор'},
  {id:'forecast', label:'Прогноз'},
  {id:'analytics', label:'Аналитика'},
  {id:'sales', label:'Продажи'},
  {id:'expenses', label:'Расходы'},
  {id:'commission', label:'ЗП продавца'},
  {id:'import', label:'Импорт истории'},
  {id:'settings', label:'Настройки'},
];
const MONTHS_RU = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let state = {
  accounts:[],
  sales:[],
  expenses:[],
  expenseCategories:[],
  descriptionPresets:[],
  commissionTiers:[],
  salaryBase:{amount:2000, threshold:5000},
  salaryRates:[],
  sellers:[],
  suppliers:[],
  balances:{cash:0,bank:0,updatedAt:null}
};
let currentTab = 'overview';
let loaded = false;
let editSaleId = null;
let editExpenseId = null;
let copyDraft = null;
let overviewPeriod = null;
let forecastMonth = null;
let salaryFrom = null, salaryTo = null, salarySellerName = '';
let editingRatePeriodId = null;

// ---------- HELPERS ----------
function uid(){ return Math.random().toString(36).slice(2,10); }
function fmt(n){ n=Number(n)||0; return n.toLocaleString('ru-RU',{maximumFractionDigits:0})+' ₽'; }
function fmtShort(n){ const v=Math.round(n); const abs=Math.abs(v); if(abs>=1000) return (v/1000).toFixed(1).replace(/\.0$/,'')+'k'; return String(v); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysAgoISO(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function pad2(n){ return String(n).padStart(2,'0'); }
function currentMonthKey(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
function shiftMonthKey(ym,delta){ let [y,m]=ym.split('-').map(Number); m+=delta; while(m>12){m-=12;y++;} while(m<1){m+=12;y--;} return y+'-'+pad2(m); }
function monthStart(ym){ return ym+'-01'; }
function monthEnd(ym){ const [y,m]=ym.split('-').map(Number); const last=new Date(y,m,0).getDate(); return ym+'-'+pad2(last); }
function monthKey(dateStr){ return dateStr ? dateStr.slice(0,7) : null; }
function monthLabel(key){ const [y,m]=key.split('-'); return MONTHS_RU[Number(m)-1]+' '+y; }
function saleGross(s){ return Number(s.cash||0)+Number(s.cashless||0); }
function shiftPay(revenue, discount, tiers, base, threshold){
  const net = revenue - Number(discount||0);
  if(net<=threshold) return base;
  const tier = tiers.find(t=> net>=t.min && (t.max===null || net<t.max));
  const rate = tier ? tier.rate : 0;
  return base + (net-threshold)*rate/100;
}
function getRateForDate(dateStr){
  const periods = [...state.salaryRates].sort((a,b)=>a.from.localeCompare(b.from));
  if(periods.length===0) return {base:0, threshold:0, travel:0, tiers:[]};
  let applicable = periods[0];
  for(const p of periods){ if(p.from<=dateStr) applicable=p; else break; }
  return applicable;
}
function shiftPayForDate(sale){
  if(sale.salaryOverride!==undefined && sale.salaryOverride!==null && sale.salaryOverride!==''){
    return Number(sale.salaryOverride);
  }
  const rate = getRateForDate(sale.date);
  return shiftPay(saleGross(sale), sale.discount, rate.tiers||[], Number(rate.base||0), Number(rate.threshold||0));
}
function shiftTravelForDate(sale){
  return Number(getRateForDate(sale.date).travel||0);
}

function getAccount(id){ return state.accounts.find(a=>a.id===id); }
function getAccountByRole(role){ return state.accounts.find(a=>a.role===role); }
function adjustAccountBalance(id, delta){ const a=getAccount(id); if(a) a.balance=(Number(a.balance)||0)+delta; }
function applySaleToAccounts(sale, sign){
  if(sale.cashAccountId) adjustAccountBalance(sale.cashAccountId, sign*Number(sale.cash||0));
  if(sale.bankAccountId) adjustAccountBalance(sale.bankAccountId, sign*Number(sale.cashless||0));
}
function applyExpenseDebit(exp){ if(exp.status==='paid' && exp.paidFrom) adjustAccountBalance(exp.paidFrom, -Number(exp.amount||0)); }
function reverseExpenseDebit(exp){ if(exp.status==='paid' && exp.paidFrom) adjustAccountBalance(exp.paidFrom, Number(exp.amount||0)); }

// ---------- LOAD / SAVE ----------
async function loadState(){
  try{
    const raw = localStorage.getItem('izhitsa-finance-data');
    if(raw){ state = Object.assign(state, JSON.parse(raw)); }
  }catch(e){}

  if(!state.accounts || state.accounts.length===0){
    const cashBal = Number(state.balances && state.balances.cash || 0);
    const bankBal = Number(state.balances && state.balances.bank || 0);
    state.accounts = [
      {id:uid(), name:'РС', role:'noncash', balance:bankBal},
      {id:uid(), name:'Касса магазин', role:'cash', balance:cashBal},
      {id:uid(), name:'Конверт дом', role:'other', balance:0},
    ];
  }
  if(!state.expenseCategories || state.expenseCategories.length===0){
    state.expenseCategories = ['Аренда','ЗП','Проезд','Закуп товара','Налоги','Мой склад','Прочее'];
  }
  if(!state.descriptionPresets) state.descriptionPresets = [];
  if(!state.sellers) state.sellers = [];
  if(!state.suppliers) state.suppliers = [];
  if(!state.commissionTiers) state.commissionTiers = [];
  if(!state.salaryBase) state.salaryBase = {amount:2000, threshold:5000};
  if(!state.salaryRates || state.salaryRates.length===0){
    const defaultTiers = (state.commissionTiers && state.commissionTiers.length>0)
      ? state.commissionTiers.map(t=>Object.assign({},t))
      : [
          {id:uid(), min:5001, max:35000, rate:10},
          {id:uid(), min:35001, max:null, rate:12}
        ];
    state.salaryRates = [{
      id:uid(), from:'1970-01-01',
      base:Number(state.salaryBase.amount||0) || 2000,
      threshold:Number(state.salaryBase.threshold||0) || 5000,
      travel:600,
      tiers: defaultTiers
    }];
  }
  state.salaryRates.forEach(p=>{ if(p.travel===undefined) p.travel=0; });
  state.sales = (state.sales||[]).map(s=>{
    if(s.cash===undefined && s.cashless===undefined){
      return Object.assign({}, s, {cash:Number(s.gross||0), cashless:0});
    }
    return s;
  });

  const ymNow = currentMonthKey();
  overviewPeriod = {from:monthStart(ymNow), to:todayISO()};
  forecastMonth = ymNow;
  salaryFrom = monthStart(ymNow); salaryTo = monthEnd(ymNow);

  loaded = true;
  saveState();
  render();
}
async function saveState(){
  try{ localStorage.setItem('izhitsa-finance-data', JSON.stringify(state)); }
  catch(e){ console.error('Ошибка сохранения', e); }
}

// ---------- NAV / RENDER ----------
function renderNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  TABS.forEach(t=>{
    const b = document.createElement('button');
    b.textContent = t.label;
    if(t.id===currentTab) b.className='active';
    b.onclick = ()=>{ currentTab=t.id; editSaleId=null; editExpenseId=null; copyDraft=null; render(); };
    nav.appendChild(b);
  });
}
function render(){
  renderNav();
  const main = document.getElementById('main');
  if(!loaded){ main.innerHTML='<div class="empty">Загрузка…</div>'; return; }
  if(currentTab==='overview') return renderOverview(main);
  if(currentTab==='forecast') return renderForecast(main);
  if(currentTab==='analytics') return renderAnalytics(main);
  if(currentTab==='sales') return renderSales(main);
  if(currentTab==='expenses') return renderExpenses(main);
  if(currentTab==='commission') return renderCommission(main);
  if(currentTab==='import') return renderImport(main);
  if(currentTab==='settings') return renderSettings(main);
}

// ---------- OVERVIEW ----------
function renderOverview(main){
  const salesInPeriod = state.sales.filter(s=>s.date>=overviewPeriod.from && s.date<=overviewPeriod.to);
  const gross = salesInPeriod.reduce((a,s)=>a+saleGross(s),0);
  const net = salesInPeriod.reduce((a,s)=>a+Number(s.net||0),0);
  const marginPct = gross ? net/gross*100 : 0;
  const opex = state.expenses.filter(e=>e.category!=='Закуп товара' && e.dueDate>=overviewPeriod.from && e.dueDate<=overviewPeriod.to)
    .reduce((a,e)=>a+Number(e.amount||0),0);
  const finResult = net - opex;

  const totalLiquid = state.accounts.reduce((a,acc)=>a+Number(acc.balance||0),0);
  const debtToSuppliers = state.expenses.filter(e=>e.category==='Закуп товара' && e.status==='planned').reduce((a,e)=>a+Number(e.amount||0),0);

  const upcoming = state.expenses.filter(e=>e.status==='planned' && e.dueDate).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const cut = daysAgoISO(-14);
  const upcomingSoon = upcoming.filter(e=>e.dueDate<=cut);

  main.innerHTML = `
    <div class="card">
      <h2>Период</h2>
      <div class="period-btns">
        <button type="button" data-ov-preset="today">Сегодня</button>
        <button type="button" data-ov-preset="7d">7 дней</button>
        <button type="button" data-ov-preset="month">Этот месяц</button>
        <button type="button" data-ov-preset="prevMonth">Прошлый месяц</button>
      </div>
      <div class="two-col">
        <div><label class="field">С</label><input type="date" id="ov-from" value="${overviewPeriod.from}"></div>
        <div><label class="field">По</label><input type="date" id="ov-to" value="${overviewPeriod.to}"></div>
      </div>
    </div>

    <div class="card">
      <h2>Счета</h2>
      ${state.accounts.map(a=>`<div class="row"><span class="label">${a.name}</span><span class="num">${fmt(a.balance||0)}</span></div>`).join('')}
      <div class="row" style="margin-top:6px; border-top:1px solid var(--line); padding-top:10px;">
        <span class="label">Итого свободных денег</span><span class="num big">${fmt(totalLiquid)}</span>
      </div>
      <div class="row">
        <span class="label">Долг поставщикам (отсрочка)</span><span class="num neg">${fmt(debtToSuppliers)}</span>
      </div>
    </div>

    <div class="card">
      <h2>За выбранный период</h2>
      <div class="stat-grid">
        <div class="stat"><span class="label">Продажи</span><span class="num">${fmt(gross)}</span></div>
        <div class="stat"><span class="label">Чистыми (маржа)</span><span class="num pos">${fmt(net)}</span></div>
      </div>
      <div class="row" style="margin-top:10px;"><span class="label">Маржинальность</span><span class="num">${marginPct.toFixed(1)}%</span></div>
      <div class="row"><span class="label">Операционные расходы</span><span class="num neg">−${fmt(opex)}</span></div>
      <div class="row" style="border-top:1px solid var(--line); padding-top:10px;">
        <span class="label">Финрезультат периода</span><span class="num big ${finResult>=0?'pos':'neg'}">${finResult>=0?'+':''}${fmt(finResult)}</span>
      </div>
    </div>

    <div class="card">
      <h2>Ближайшие платежи (14 дней)</h2>
      ${upcomingSoon.length===0 ? '<div class="empty">Нет запланированных платежей</div>' :
        `<table><thead><tr><th>Дата</th><th>Категория</th><th>Сумма</th></tr></thead><tbody>
          ${upcomingSoon.map(e=>`<tr><td>${e.dueDate}</td><td class="txt">${e.category}</td><td>${fmt(e.amount)}</td></tr>`).join('')}
        </tbody></table>`}
    </div>
  `;

  main.querySelectorAll('[data-ov-preset]').forEach(btn=>{
    btn.onclick = ()=>{
      const type = btn.dataset.ovPreset; const today = todayISO();
      if(type==='today') overviewPeriod={from:today, to:today};
      else if(type==='7d') overviewPeriod={from:daysAgoISO(6), to:today};
      else if(type==='month'){ const ym=currentMonthKey(); overviewPeriod={from:monthStart(ym), to: today<monthEnd(ym)?today:monthEnd(ym)}; }
      else if(type==='prevMonth'){ const ym=shiftMonthKey(currentMonthKey(),-1); overviewPeriod={from:monthStart(ym), to:monthEnd(ym)}; }
      render();
    };
  });
  document.getElementById('ov-from').onchange = ()=>{ overviewPeriod.from=document.getElementById('ov-from').value; render(); };
  document.getElementById('ov-to').onchange = ()=>{ overviewPeriod.to=document.getElementById('ov-to').value; render(); };
}

// ---------- FORECAST CALENDAR ----------
function renderForecast(main){
  const last30 = state.sales.filter(s=>s.date>=daysAgoISO(30));
  const avgDailyNet = last30.length ? last30.reduce((a,s)=>a+Number(s.net||0),0)/30 : 0;

  const [y,m] = forecastMonth.split('-').map(Number);
  const daysInMonth = new Date(y,m,0).getDate();
  let startWeekday = new Date(y,m-1,1).getDay();
  startWeekday = (startWeekday+6)%7;
  const today = todayISO();

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;
    const isFuture = dateStr>today;
    const salesForDay = state.sales.filter(s=>s.date===dateStr);
    const netForDay = salesForDay.reduce((a,s)=>a+Number(s.net||0),0);
    const opexDueForDay = state.expenses.filter(e=>e.category!=='Закуп товара' && e.dueDate===dateStr).reduce((a,e)=>a+Number(e.amount||0),0);
    let value, hasData, cls;
    if(!isFuture){
      hasData = salesForDay.length>0 || opexDueForDay>0;
      value = netForDay - opexDueForDay;
      cls = hasData ? (value>=0?'pos':'neg') : '';
    } else {
      hasData = true;
      value = avgDailyNet - opexDueForDay;
      cls = (value>=0?'pos':'neg') + ' future';
    }
    cells += `<div class="cal-cell ${cls}"><span class="d">${d}</span>${hasData?`<span class="v">${value>=0?'+':''}${fmtShort(value)}</span>`:''}</div>`;
  }

  main.innerHTML = `
    <div class="card">
      <div class="cal-nav">

  document.getElementById('cal-next').onclick = ()=>{ forecastMonth = shiftMonthKey(forecastMonth,1); render(); };
}

// ---------- ANALYTICS ----------
function buildMonthlyData(){
  const months = new Set();
  state.sales.forEach(s=>{ if(s.date) months.add(monthKey(s.date)); });
  state.expenses.forEach(e=>{ if(e.dueDate) months.add(monthKey(e.dueDate)); if(e.paidDate) months.add(monthKey(e.paidDate)); });
  const sorted = [...months].filter(Boolean).sort();

  return sorted.map(key=>{
    const monthSales = state.sales.filter(s=>monthKey(s.date)===key);
    const salesGross = monthSales.reduce((a,s)=>a+saleGross(s),0);
    const salesNet = monthSales.reduce((a,s)=>a+Number(s.net||0),0);
    const opex = state.expenses.filter(e=>e.category!=='Закуп товара' && monthKey(e.dueDate)===key).reduce((a,e)=>a+Number(e.amount||0),0);
    const finResult = salesNet - opex;
    const cashIn = salesGross;
    const cashOut = state.expenses.filter(e=>e.status==='paid' && monthKey(e.paidDate)===key).reduce((a,e)=>a+Number(e.amount||0),0);
    const cashResult = cashIn - cashOut;
    return {key, label:monthLabel(key), salesGross, salesNet, opex, finResult, cashIn, cashOut, cashResult};
  });
}
function renderAnalytics(main){
  const data = buildMonthlyData();
  const debtToSuppliers = state.expenses.filter(e=>e.category==='Закуп товара' && e.status==='planned').reduce((a,e)=>a+Number(e.amount||0),0);

  if(data.length===0){
    main.innerHTML = `<div class="card"><div class="empty">Пока недостаточно данных для аналитики.</div></div>`;
    return;
  }
  const maxAbs = Math.max(1, ...data.flatMap(d=>[Math.abs(d.finResult), Math.abs(d.cashResult)]));
  const barMaxPx = 70;

  main.innerHTML = `
    <div class="card">
      <h2>Долг поставщикам (отсрочка)</h2>
      <div class="row"><span class="label">Получено товара, ещё не оплачено</span><span class="num big neg">${fmt(debtToSuppliers)}</span></div>
    </div>

    <div class="card">
      <h2>Финрезультат по месяцам</h2>
      <div class="note" style="margin-bottom:12px;">
        <span style="color:var(--brick-dark); font-weight:600;">■ Финрезультат</span> — прибыль/убыток по факту продаж за месяц.<br>
        <span style="color:var(--slate); font-weight:600;">■ Движение денег</span> — реальный приход/расход денег, включая оплату поставщикам по факту.
      </div>
      <div class="chart-wrap">
        <div class="chart-baseline"></div>
        ${data.map(d=>{
          const finH = Math.round(Math.abs(d.finResult)/maxAbs*barMaxPx);
          const cashH = Math.round(Math.abs(d.cashResult)/maxAbs*barMaxPx);
          const finStyle = d.finResult>=0 ? `bottom:${barMaxPx}px; height:${finH}px;` : `top:${barMaxPx}px; height:${finH}px;`;
          const cashStyle = d.cashResult>=0 ? `bottom:${barMaxPx}px; height:${cashH}px;` : `top:${barMaxPx}px; height:${cashH}px;`;
          return `<div class="chart-col">
            <div class="chart-bars">
              <div class="bar-slot"><div class="bar fin ${d.finResult>=0?'pos':'neg'}" style="${finStyle}"></div></div>
              <div class="bar-slot"><div class="bar cash ${d.cashResult>=0?'pos':'neg'}" style="${cashStyle}"></div></div>
            </div>
            <div class="chart-label">${d.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <h2>Закрытие месяцев</h2>
      <table><thead><tr><th>Месяц</th><th>Маржа</th><th>Опер.расх.</th><th>Финрез.</th><th>Касса</th></tr></thead><tbody>
        ${data.slice().reverse().map(d=>`
          <tr>
            <td class="txt">${d.label}</td>
            <td>${fmt(d.salesNet)}</td>
            <td>−${fmt(d.opex)}</td>
            <td class="${d.finResult>=0?'pos':'neg'}">${d.finResult>=0?'+':''}${fmt(d.finResult)}</td>
            <td class="${d.cashResult>=0?'pos':'neg'}">${d.cashResult>=0?'+':''}${fmt(d.cashResult)}</td>
          </tr>`).join('')}
      </tbody></table>
    </div>
  `;
}

    const discount = Number(document.getElementById('s-discount').value||0);
    const net = Number(document.getElementById('s-net').value||0);

    if(editSaleId){
      const existing = state.sales.find(s=>s.id===editSaleId);
      applySaleToAccounts(existing,-1);
      existing.date=date; existing.seller=seller; existing.cash=cash; existing.cashless=cashless; existing.discount=discount; existing.net=net;
      const cashAcc=getAccountByRole('cash'); const bankAcc=getAccountByRole('noncash');
      existing.cashAccountId = cashAcc?cashAcc.id:null; existing.bankAccountId = bankAcc?bankAcc.id:null;

      editSaleId = null;
    } else {
      const cashAcc=getAccountByRole('cash'); const bankAcc=getAccountByRole('noncash');

  main.querySelectorAll('[data-edit-sale]').forEach(btn=>{

  document.getElementById('s-import-btn').onclick = ()=>{

    raw.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{

        state.sales.push(sale);
        applySaleToAccounts(sale,1);
      }
    });
    saveState(); render();
  };

  main.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=>{
      const sale = state.sales.find(s=>s.id===btn.dataset.del);
      if(sale) applySaleToAccounts(sale,-1);
      state.sales = state.sales.filter(s=>s.id!==btn.dataset.del);
      saveState(); render();
    };
  });
}

    const existing = document.getElementById('bulk-dates').value.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
    const set = new Set(existing);
    let d = new Date(from+'T00:00:00');

      set.add(d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()));

    const supplierEl = document.getElementById('bulk-supplier');

    const sellerEl = document.getElementById('bulk-seller');
    const seller = sellerEl ? sellerEl.value : '';

    const amount = Number(document.getElementById('bulk-amount').value||0);

        id: uid(), category, supplier, seller, description, amount,
        dueDate: dateStr, status,
        paidFrom: status==='paid' ? paidFrom : null,
        paidDate: status==='paid' ? dateStr : null
      };
      state.expenses.push(exp);
      applyExpenseDebit(exp);
      added++;

    saveState();
    box.innerHTML = `<div class="note">Добавлено записей: ${added}.</div>`;

  document.getElementById('e-add').onclick = ()=>{
    const category = document.getElementById('e-cat').value;
    const supplierEl = document.getElementById('e-supplier');
    const supplier = supplierEl ? supplierEl.value : '';
    const sellerEl = document.getElementById('e-seller');

    const status = document.getElementById('e-status').value;
    const paidFrom = document.getElementById('e-paidfrom').value || null;
    let paidDate = document.getElementById('e-paiddate').value;
    if(!amount) return;
    if(status==='paid' && !paidDate) paidDate = dueDate;

    if(editExpenseId){
      const existing = state.expenses.find(e=>e.id===editExpenseId);
      reverseExpenseDebit(existing);
      existing.category=category; existing.supplier=supplier; existing.seller=seller;
      existing.description=description; existing.amount=amount; existing.dueDate=dueDate;
      existing.status=status; existing.paidFrom = status==='paid' ? paidFrom : null;
      existing.paidDate = status==='paid' ? paidDate : null;
      applyExpenseDebit(existing);
      editExpenseId = null;
    } else {
      const exp = {id:uid(), category, supplier, seller, description, amount, dueDate, status, paidFrom: status==='paid'?paidFrom:null, paidDate: status==='paid'?paidDate:null};
      state.expenses.push(exp);
      applyExpenseDebit(exp);
    }
    copyDraft = null;
    saveState(); render();
  };

  const cancelBtn = document.getElementById('e-cancel');
  if(cancelBtn) cancelBtn.onclick = ()=>{ editExpenseId=null; copyDraft=null; render(); };

  main.querySelectorAll('[data-edit-exp]').forEach(btn=>{
    btn.onclick = ()=>{ editExpenseId = btn.dataset.editExp; copyDraft=null; render(); window.scrollTo(0,0); };
  });
  main.querySelectorAll('[data-copy-exp]').forEach(btn=>{
    btn.onclick = ()=>{
      const src = state.expenses.find(e=>e.id===btn.dataset.copyExp);
      if(!src) return;
      copyDraft = {category:src.category, supplier:src.supplier, seller:src.seller, description:src.description, amount:src.amount, dueDate:src.dueDate, status:src.status, paidFrom:src.paidFrom, paidDate:src.paidDate};
      editExpenseId = null;
      render(); window.scrollTo(0,0);
    };
  });
  main.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=>{
      const exp = state.expenses.find(e=>e.id===btn.dataset.del);
      if(exp) reverseExpenseDebit(exp);
      state.expenses = state.expenses.filter(e=>e.id!==btn.dataset.del);
      saveState(); render();
    };
  });
  main.querySelectorAll('[data-status]').forEach(sel=>{
    sel.onchange = ()=>{
      const exp = state.expenses.find(e=>e.id===sel.dataset.status);
      if(!exp) return;
      if(sel.value==='paid' && exp.status!=='paid'){
        exp.status='paid';
        if(!exp.paidDate) exp.paidDate=todayISO();
        if(!exp.paidFrom){ const first=state.accounts[0]; exp.paidFrom = first?first.id:null; }
        applyExpenseDebit(exp);
      } else if(sel.value==='planned' && exp.status==='paid'){
        reverseExpenseDebit(exp);
        exp.status='planned'; exp.paidDate=null; exp.paidFrom=null;
      }
      saveState(); render();
    };
  });
  main.querySelectorAll('[data-account]').forEach(sel=>{
    sel.onchange = ()=>{
      const exp = state.expenses.find(e=>e.id===sel.dataset.account);
      if(!exp) return;
      if(exp.status==='paid' && exp.paidFrom) adjustAccountBalance(exp.paidFrom, Number(exp.amount||0));
      exp.paidFrom = sel.value || null;
      if(exp.status==='paid' && exp.paidFrom) adjustAccountBalance(exp.paidFrom, -Number(exp.amount||0));
      saveState(); render();
    };
  });
  main.querySelectorAll('[data-paiddate]').forEach(inp=>{
    inp.onchange = ()=>{
      const exp = state.expenses.find(e=>e.id===inp.dataset.paiddate);
      if(!exp) return;
      exp.paidDate = inp.value;
      saveState(); render();
    };
  });
}

// ---------- COMMISSION / ЗП ----------
function buildSalaryMonthlyData(){
  const months = {};
  state.sales.forEach(s=>{
    if(!s.seller || !s.date) return;
    const k = monthKey(s.date);
    months[k] = months[k] || {};
    months[k][s.seller] = months[k][s.seller] || [];
    months[k][s.seller].push(s);
  });

  const monthKeys = Object.keys(months).sort().reverse();
  return monthKeys.map(k=>{
    const sellersInMonth = Object.keys(months[k]).sort((a,b)=>a.localeCompare(b,'ru'));
    const rows = sellersInMonth.map(name=>{
      const shifts = months[k][name];
      const shiftsCount = shifts.length;
      const revenue = shifts.reduce((a,s)=>a+saleGross(s),0);
      const salesPay = shifts.reduce((a,s)=>a+shiftPayForDate(s),0);
      const travel = shifts.reduce((a,s)=>a+shiftTravelForDate(s),0);
      const totalAccrued = salesPay + travel;
      const avgRevenue = shiftsCount ? revenue/shiftsCount : 0;
      const avgEarn = shiftsCount ? totalAccrued/shiftsCount : 0;
      const pct = revenue ? totalAccrued/revenue*100 : 0;
      return {name, shiftsCount, revenue, totalAccrued, avgRevenue, avgEarn, pct};
    });
    return {key:k, label:monthLabel(k), rows};
  });
}

        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        const dataRows = rows.slice(1).filter(r=>r.length>0 && r[0]!=='');
        const {added, skipped} = importRows(dataRows);
        render();
        setTimeout(()=>{
          const box2 = document.getElementById('imp-file-result');
          if(box2) box2.innerHTML = `<div class="note">Импортировано записей: ${added}${skipped?`, пропущено: ${skipped}`:''}.</div>`;
        },0);
      }catch(err){
        box.innerHTML = '<div class="note">Не удалось прочитать файл. Проверьте, что это .xlsx/.xls/.csv, сохранённый из Excel.</div>';
        console.error(err);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  document.getElementById('imp-run').onclick = ()=>{
    const raw = document.getElementById('imp-text').value.trim();
    const box = document.getElementById('imp-result');
    if(!raw){ box.innerHTML=''; return; }
    const rows = raw.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>line.split(';').map(p=>p.trim()));
    const {added, skipped} = importRows(rows);
    box.innerHTML = `<div class="note">Импортировано записей: ${added}${skipped?`, пропущено: ${skipped}`:''}. Данные появятся на вкладках «Продажи» и «ЗП продавца».</div>`;
    document.getElementById('imp-text').value = '';
  };
}

// ---------- SETTINGS ----------
function renderSettings(main){
  const sellersSorted = [...state.sellers].sort((a,b)=>a.name.localeCompare(b.name,'ru'));
  const suppliersSorted = [...state.suppliers].sort((a,b)=>a.name.localeCompare(b.name,'ru'));

  main.innerHTML = `
    <div class="card">
      <h2>Категории хранения денег</h2>
      ${state.accounts.length===0 ? '<div class="empty">Список пуст</div>' :
        `<table><thead><tr><th>Название</th><th>Тип</th><th>Остаток</th><th></th></tr></thead><tbody>
          ${state.accounts.map(a=>`
            <tr>
              <td class="txt">${a.name}</td>
              <td class="txt">${a.role==='cash'?'Наличные':a.role==='noncash'?'Безнал (РС)':'Прочее'}</td>
              <td><input type="number" class="inline-date" data-acc-balance="${a.id}" value="${a.balance||0}"></td>
              <td><button class="del-x" data-del-account="${a.id}">✕</button></td>
            </tr>`).join('')}
        </tbody></table>`}
      <label class="field">Название</label>
      <input type="text" id="acc-name" placeholder="напр. Сейф офис">
      <label class="field">Тип</label>
      <select id="acc-role">
        <option value="cash">Наличные (получает нал. с продаж)</option>
        <option value="noncash">Безналичные / РС (получает безнал с продаж)</option>
        <option value="other">Прочее</option>
      </select>
      <button class="btn secondary" id="acc-add">Добавить</button>
      <div class="note">Наличные и безналичные из «Продаж» автоматически зачисляются на счета с соответствующим типом. При оплате расхода деньги списываются со счёта, который вы выберете.</div>
    </div>

    <div class="card">
      <h2>Категории расходов</h2>
      <div class="preset-row">${state.expenseCategories.map(c=>`<span class="tag">${c} <button class="del-x" data-del-cat="${c}">✕</button></span>`).join('')}</div>
      <label class="field">Новая категория</label>
      <input type="text" id="cat-name" placeholder="напр. Реклама">
      <button class="btn secondary" id="cat-add">Добавить категорию</button>
    </div>

    <div class="card">
      <h2>Продавцы</h2>
      ${sellersSorted.length===0 ? '<div class="empty">Список пуст</div>' :
        `<table><thead><tr><th>Имя</th><th></th></tr></thead><tbody>
          ${sellersSorted.map(s=>`<tr><td class="txt">${s.name}</td><td><button class="del-x" data-del-seller="${s.id}">✕</button></td></tr>`).join('')}
        </tbody></table>`}
      <label class="field">Имя продавца</label>
      <input type="text" id="seller-name" placeholder="напр. Анна">
      <button class="btn secondary" id="seller-add">Добавить продавца</button>
      <div class="note">Оклад, % от выручки и проезд теперь считаются по единой формуле на вкладке «ЗП продавца» (периоды ставок) — она одна для всех продавцов.</div>
    </div>

    <div class="card">
      <h2>Поставщики товаров и услуг</h2>
      ${suppliersSorted.length===0 ? '<div class="empty">Список пуст</div>' :
        `<table><thead><tr><th>Название</th><th>Тип</th><th></th></tr></thead><tbody>
          ${suppliersSorted.map(s=>`<tr><td class="txt">${s.name}</td><td class="txt">${s.type}</td><td><button class="del-x" data-del-supplier="${s.id}">✕</button></td></tr>`).join('')}
        </tbody></table>`}
      <label class="field">Название поставщика</label>
      <input type="text" id="supplier-name" placeholder="напр. ЛесТорг">
      <label class="field">Тип</label>
      <select id="supplier-type"><option>Товары</option><option>Услуги</option></select>
      <button class="btn secondary" id="supplier-add">Добавить поставщика</button>
    </div>

    <div class="card">
      <h2>Данные приложения</h2>
      <div class="note">Все данные хранятся локально в этом приложении и доступны только вам.</div>
      <button class="btn danger" id="b-reset">Очистить все данные</button>
    </div>
  `;

  main.querySelectorAll('[data-acc-balance]').forEach(inp=>{
    inp.onchange = ()=>{ const acc=getAccount(inp.dataset.accBalance); if(acc) acc.balance=Number(inp.value||0); saveState(); render(); };
  });
  document.getElementById('acc-add').onclick = ()=>{
    const name = document.getElementById('acc-name').value.trim();
    const role = document.getElementById('acc-role').value;
    if(!name) return;
    state.accounts.push({id:uid(), name, role, balance:0});
    saveState(); render();
  };
  main.querySelectorAll('[data-del-account]').forEach(btn=>{
    btn.onclick = ()=>{ state.accounts = state.accounts.filter(a=>a.id!==btn.dataset.delAccount); saveState(); render(); };
  });

  document.getElementById('cat-add').onclick = ()=>{
    const name = document.getElementById('cat-name').value.trim();
    if(!name || state.expenseCategories.includes(name)) return;
    state.expenseCategories.push(name);
    saveState(); render();
  };
  main.querySelectorAll('[data-del-cat]').forEach(btn=>{
    btn.onclick = ()=>{ state.expenseCategories = state.expenseCategories.filter(c=>c!==btn.dataset.delCat); saveState(); render(); };
  });

  document.getElementById('seller-add').onclick = ()=>{
    const name = document.getElementById('seller-name').value.trim();
    if(!name) return;
    state.sellers.push({id:uid(), name});
    saveState(); render();
  };
  main.querySelectorAll('[data-del-seller]').forEach(btn=>{
    btn.onclick = ()=>{ state.sellers = state.sellers.filter(s=>s.id!==btn.dataset.delSeller); saveState(); render(); };
  });

  document.getElementById('supplier-add').onclick = ()=>{
    const name = document.getElementById('supplier-name').value.trim();
    const type = document.getElementById('supplier-type').value;
    if(!name) return;
    state.suppliers.push({id:uid(), name, type});
    saveState(); render();
  };
  main.querySelectorAll('[data-del-supplier]').forEach(btn=>{
    btn.onclick = ()=>{ state.suppliers = state.suppliers.filter(s=>s.id!==btn.dataset.delSupplier); saveState(); render(); };
  });

  document.getElementById('b-reset').onclick = ()=>{
    if(!confirm('Удалить все данные без возможности восстановления?')) return;
    localStorage.removeItem('izhitsa-finance-data');
    location.reload();
  };
}

loadState();
</script>
</body>
</html>
