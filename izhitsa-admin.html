<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ижица - Администрирование</title>
<style>
:root{
  --bg:#0f0f13;--s1:#1a1a22;--s2:#22222e;--border:#2e2e3e;
  --accent:#c8f060;--a2:#60c8f0;--a3:#f06090;--a4:#f0a060;--a5:#a060f0;
  --text:#f0f0f8;--t2:#8888aa;--t3:#555568;
  --inc:#60f090;--exp:#f06060;--r:14px;--tabh:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Golos Text',sans-serif;min-height:100dvh;max-width:480px;margin:0 auto}

#loginScreen{display:flex;flex-direction:column;min-height:100dvh;padding:48px 24px 24px;background:var(--bg)}
.app-logo{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;color:var(--accent);margin-bottom:4px}
.app-sub{font-size:12px;color:var(--t2);margin-bottom:28px}
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.role-card{background:var(--s1);border:2px solid var(--border);border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.role-card.selected{border-color:var(--accent);background:#1e2a14;box-shadow:0 0 0 2px var(--accent)}
.role-card .ri{font-size:26px;margin-bottom:6px}
.role-card .rn{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700}
.role-card .rs{font-size:10px;color:var(--t2);margin-top:3px}

.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.fi{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px}
.fi::placeholder{color:var(--t3)}

.btn{width:100%;padding:12px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--accent);color:#000}
.btn:active{opacity:0.8}
.btn.sec{background:var(--s2);color:var(--t2)}

#appScreen{display:none;min-height:100dvh;padding:20px 16px 80px;background:var(--bg)}
#appScreen h2{color:var(--accent);margin-bottom:12px}
#appScreen h3{color:var(--accent);margin:20px 0 12px;font-size:16px}
#appScreen h4{font-size:14px;margin-bottom:12px}

#tabsBar{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:62px;background:var(--s1);border-top:1px solid var(--border);z-index:100;overflow-x:auto}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;border:none;background:none;color:var(--t2);cursor:pointer;font-size:11px;font-weight:500;transition:color .2s}
.tab.active{color:var(--accent)}

.checkbox-label{display:flex;align-items:center;gap:8px;padding:10px;background:var(--s2);border-radius:8px;cursor:pointer;margin-bottom:8px}
.checkbox-label input{width:16px;height:16px;cursor:pointer}

.seller-item{padding:12px;background:var(--s2);border-radius:8px;margin-bottom:10px}
.seller-name{font-weight:600;margin-bottom:4px}
.seller-shops{font-size:12px;color:var(--t2);margin-bottom:10px}
.seller-actions{display:flex;gap:8px}
.seller-actions button{flex:1;padding:8px;font-size:12px}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="app-logo">Ижица</div>
  <div class="app-sub">Администрирование и аналитика</div>
  <div style="text-align:center;font-size:10px;color:var(--t2);margin-bottom:20px">v6</div>

  <div class="role-grid">
    <div class="role-card" onclick="selectAdminRole('admin', this)">
      <div class="ri">🔐</div>
      <div class="rn">Администратор</div>
      <div class="rs">Полный доступ</div>
    </div>
    <div class="role-card" onclick="selectAdminRole('owner', this)">
      <div class="ri">👑</div>
      <div class="rn">Владелец</div>
      <div class="rs">Аналитика</div>
    </div>
    <div class="role-card" onclick="selectAdminRole('accountant', this)">
      <div class="ri">📊</div>
      <div class="rn">Бухгалтер</div>
      <div class="rs">Учёт</div>
    </div>
  </div>

  <div class="fg"><label class="fl">Пользователь</label><select class="fi" id="loginUser"><option>— выберите роль —</option></select></div>
  <div class="fg"><label class="fl">Пароль</label><input class="fi" type="password" id="loginPass"></div>
  <button class="btn" onclick="doLogin()">Войти →</button>
  <div id="loginErr" style="color:var(--exp);font-size:12px;margin-top:8px;text-align:center;min-height:16px"></div>
</div>

<!-- App Screen -->
<div id="appScreen">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <h2>Добро пожаловать</h2>
    <button class="btn sec" style="width:auto;padding:8px 12px;font-size:12px" onclick="doLogout()">Выход</button>
  </div>
  <p id="userGreeting" style="color:var(--t2);margin-bottom:20px;font-size:14px"></p>

  <!-- Staff Tab -->
  <div id="staffTab">
    <h3>👥 Сотрудники</h3>
    
    <div style="background:var(--s2);padding:16px;border-radius:12px;margin-bottom:20px">
      <h4>Добавить продавца</h4>
      
      <div class="fg">
        <label class="fl">Имя</label>
        <input class="fi" type="text" id="sellerName" placeholder="Иванова Мария">
      </div>
      
      <div class="fg">
        <label class="fl">Пароль</label>
        <input class="fi" type="password" id="sellerPass">
      </div>
      
      <div class="fg">
        <label class="fl">Магазины (выберите один или несколько)</label>
        <div id="shopCheckboxes"></div>
      </div>
      
      <button class="btn" onclick="addSeller()">Добавить продавца</button>
    </div>
    
    <h4 style="border-top:1px solid var(--border);padding-top:16px">Список продавцов</h4>
    <div id="sellersList"></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;padding:20px;overflow-y:auto">
  <div style="background:var(--s1);padding:20px;border-radius:14px;margin-top:100px;max-width:400px;margin-left:auto;margin-right:auto">
    <h3 style="margin-bottom:16px">Изменить магазины</h3>
    <div id="editSellerName" style="margin-bottom:16px;color:var(--t2)"></div>
    <div id="editShopCheckboxes"></div>
    <button class="btn" onclick="saveSellerEdit()" style="margin-bottom:10px">Сохранить</button>
    <button class="btn sec" onclick="closeEditModal()">Закрыть</button>
  </div>
</div>

<!-- Tabs Bar -->
<div id="tabsBar">
  <button class="tab active" onclick="showTab('staff')">
    <div style="font-size:18px">👥</div>
    <span>Сотрудники</span>
  </button>
</div>

<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" crossorigin="anonymous"></script>
<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" crossorigin="anonymous"></script>

<script>
let selectedRole = null;
let editingId = null;

function gv(id) {
  return document.getElementById(id)?.value || '';
}

function getAdminUsers() {
  try {
    return JSON.parse(localStorage.getItem('iz_admin_users') || '[]');
  } catch(e) {
    return [];
  }
}

function getShops() {
  try {
    return JSON.parse(localStorage.getItem('iz_shops') || '[]');
  } catch(e) {
    return [];
  }
}

function getSellers() {
  try {
    return JSON.parse(localStorage.getItem('iz_sellers') || '[]');
  } catch(e) {
    return [];
  }
}

function saveSellers(sellers) {
  localStorage.setItem('iz_sellers', JSON.stringify(sellers));
}

function selectAdminRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  
  var users = getAdminUsers().filter(u => u.role === role);
  var html = users.length ? users.map(u => '<option value="' + u.id + '">' + u.name + '</option>').join('') : '<option>— нет пользователей —</option>';
  document.getElementById('loginUser').innerHTML = html;
}

function doLogin() {
  var uid = gv('loginUser');
  var pass = gv('loginPass');
  
  if(!uid) {
    document.getElementById('loginErr').textContent = 'Выберите пользователя';
    return;
  }
  
  var users = getAdminUsers();
  var user = users.find(u => u.id === uid);
  
  if(!user || user.pass !== pass) {
    document.getElementById('loginErr').textContent = 'Неверный пароль';
    return;
  }
  
  sessionStorage.setItem('iz_admin_session', JSON.stringify({id: user.id, name: user.name, role: user.role}));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('tabsBar').style.display = 'flex';
  document.getElementById('userGreeting').innerHTML = 'Вы вошли как <strong>' + user.name + '</strong> (' + user.role + ')';
  
  renderSellers();
}

function doLogout() {
  sessionStorage.removeItem('iz_admin_session');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('tabsBar').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.closest('.tab').classList.add('active');
}

function renderShopCheckboxes() {
  var shops = getShops();
  var html = shops.map(s => '<label class="checkbox-label"><input type="checkbox" value="' + s + '"><span>' + s + '</span></label>').join('');
  document.getElementById('shopCheckboxes').innerHTML = html;
  document.getElementById('editShopCheckboxes').innerHTML = html;
}

function addSeller() {
  var name = gv('sellerName');
  var pass = gv('sellerPass');
  
  if(!name || !pass) {
    alert('Заполните имя и пароль');
    return;
  }
  
  var checkboxes = document.querySelectorAll('#shopCheckboxes input:checked');
  var shops = Array.from(checkboxes).map(cb => cb.value);
  
  if(!shops.length) {
    alert('Выберите хотя бы один магазин');
    return;
  }
  
  var sellers = getSellers();
  sellers.push({
    id: Date.now().toString(),
    name: name,
    shops: shops,
    pass: pass
  });
  
  saveSellers(sellers);
  document.getElementById('sellerName').value = '';
  document.getElementById('sellerPass').value = '';
  checkboxes = document.querySelectorAll('#shopCheckboxes input');
  checkboxes.forEach(cb => cb.checked = false);
  alert('Продавец добавлен!');
}

function editSeller(id) {
  var seller = getSellers().find(s => s.id === id);
  if(!seller) return;
  
  editingId = id;
  document.getElementById('editSellerName').innerHTML = 'Продавец: <strong>' + seller.name + '</strong>';
  
  var checkboxes = document.querySelectorAll('#editShopCheckboxes input');
  checkboxes.forEach(cb => {
    cb.checked = seller.shops.includes(cb.value);
  });
  
  document.getElementById('editModal').style.display = 'block';
}

function saveSellerEdit() {
  var checkboxes = document.querySelectorAll('#editShopCheckboxes input:checked');
  var shops = Array.from(checkboxes).map(cb => cb.value);
  
  if(!shops.length) {
    alert('Выберите хотя бы один магазин');
    return;
  }
  
  var sellers = getSellers();
  var seller = sellers.find(s => s.id === editingId);
  if(seller) {
    seller.shops = shops;
    saveSellers(sellers);
    closeEditModal();
  }
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  editingId = null;
}

function deleteSeller(id) {
  if(!confirm('Удалить продавца?')) return;
  var sellers = getSellers().filter(s => s.id !== id);
  saveSellers(sellers);
}

function renderSellers() {
  var sellers = getSellers();
  var html = '';
  
  if(sellers.length === 0) {
    html = '<p style="color:var(--t2);font-size:12px">Продавцов нет</p>';
  } else {
    for(var i = 0; i < sellers.length; i++) {
      var s = sellers[i];
      html += '<div class="seller-item">';
      html += '<div class="seller-name">' + s.name + '</div>';
      html += '<div class="seller-shops">Магазины: ' + s.shops.join(', ') + '</div>';
      html += '<div class="seller-actions">';
      html += '<button class="btn" onclick="editSeller(\'' + s.id + '\')">Изменить</button>';
      html += '<button class="btn" style="background:var(--exp)" onclick="deleteSeller(\'' + s.id + '\')">Удалить</button>';
      html += '</div>';
      html += '</div>';
    }
  }
  
  document.getElementById('sellersList').innerHTML = html;
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  // Set up default shops
  if(!localStorage.getItem('iz_shops')) {
    localStorage.setItem('iz_shops', JSON.stringify(['Роза Хутор', 'Горки', 'Мастерская']));
  }
  
  // Check if logged in
  var session = sessionStorage.getItem('iz_admin_session');
  if(session) {
    try {
      session = JSON.parse(session);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      document.getElementById('tabsBar').style.display = 'flex';
      document.getElementById('userGreeting').innerHTML = 'Вы вошли как <strong>' + session.name + '</strong> (' + session.role + ')';
      renderSellers();
    } catch(e) {}
  }
  
  renderShopCheckboxes();
  selectAdminRole('admin', document.querySelectorAll('.role-card')[0]);
});
</script>

</body>
</html>
