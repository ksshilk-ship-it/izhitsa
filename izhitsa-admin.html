<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ижица - Администрирование</title>
<style>
:root{
  --bg:#0f0f13;--s1:#1a1a22;--s2:#22222e;--border:#2e2e3e;
  --accent:#c8f060;--a2:#60c8f0;--a3:#f06090;--a4:#f0a060;--a5:#a060f0;
  --text:#f0f0f8;--t2:#8888aa;--t3:#555568;
  --inc:#60f090;--exp:#f06060;--r:14px;--tabh:62px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Golos Text',sans-serif;min-height:100dvh;max-width:480px;margin:0 auto}

#loginScreen{display:flex;flex-direction:column;min-height:100dvh;padding:48px 24px 24px;background:var(--bg)}
.app-logo{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;color:var(--accent);margin-bottom:4px}
.app-sub{font-size:12px;color:var(--t2);margin-bottom:28px}
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;position:relative;z-index:10}
.role-card{background:var(--s1);border:2px solid var(--border);border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;display:inline-block;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.role-card.selected{border-color:var(--accent);background:#1e2a14;box-shadow:0 0 0 2px var(--accent)}
.role-card .ri{font-size:26px;margin-bottom:6px}
.role-card .rn{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700}
.role-card .rs{font-size:10px;color:var(--t2);margin-top:3px}

.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;color:var(--t2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.fi{width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px}
.fi::placeholder{color:var(--t3)}

.btn{width:100%;padding:12px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn{background:var(--accent);color:#000}
.btn:active{opacity:0.8}
.btn.sec{background:var(--s2);color:var(--t2)}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="app-logo">Ижица</div>
  <div class="app-sub">Администрирование и аналитика</div>

  <div style="text-align:center;font-size:10px;color:var(--t2);margin-bottom:20px">v5</div>

  <div class="role-grid">
    <div class="role-card" onclick="selectAdminRole('admin', this)">
      <div class="ri">🔐</div>
      <div class="rn">Администратор</div>
      <div class="rs">Полный доступ ко всему</div>
    </div>
    <div class="role-card" onclick="selectAdminRole('owner', this)">
      <div class="ri">👑</div>
      <div class="rn">Владелец</div>
      <div class="rs">Аналитика + операции</div>
    </div>
    <div class="role-card" onclick="selectAdminRole('accountant', this)">
      <div class="ri">📊</div>
      <div class="rn">Бухгалтер</div>
      <div class="rs">Учёт и настройки</div>
    </div>
  </div>

  <div class="fg"><label class="fl">Пользователь</label><select class="fi" id="loginUser"><option>— выберите роль —</option></select></div>
  <div class="fg"><label class="fl">Пароль</label><input class="fi" type="password" id="loginPass" placeholder="Придумайте пароль"></div>
  <button class="btn" onclick="doLogin()">Войти →</button>
  <div id="loginErr" style="color:var(--exp);font-size:12px;margin-top:8px;text-align:center;min-height:16px"></div>
</div>

<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" crossorigin="anonymous"></script>
<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" crossorigin="anonymous"></script>

<!-- Edit Modal -->
<div id="editSellerModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;padding:20px;overflow-y:auto">
  <div style="background:var(--s1);padding:20px;border-radius:14px;margin-top:50px;max-width:400px;margin-left:auto;margin-right:auto">
    <h3 style="margin-bottom:20px">Изменить доступы</h3>
    <div id="editSellerName" style="margin-bottom:12px;color:var(--t2)"></div>
    <div id="editShopCheckboxes" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px"></div>
    <button class="btn" onclick="saveSellerEdit()" style="margin-bottom:10px">Сохранить</button>
    <button class="btn sec" onclick="document.getElementById('editSellerModal').style.display='none'">Закрыть</button>
  </div>
</div>

<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" crossorigin="anonymous"></script>
<script async src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" crossorigin="anonymous"></script>

<script>
let selectedRole = null;
let db = null;
let session = null;

function gv(id) {
  var el = document.getElementById(id);
  return el ? el.value : '';
}

function getAdminUsers() {
  try {
    return JSON.parse(localStorage.getItem('iz_admin_users') || '[]');
  } catch(e) {
    return [];
  }
}

function getShops() {
  try {
    return JSON.parse(localStorage.getItem('iz_shops') || '[]');
  } catch(e) {
    return [];
  }
}

function getSellers() {
  try {
    return JSON.parse(localStorage.getItem('iz_sellers') || '[]');
  } catch(e) {
    return [];
  }
}

function saveSellers(sellers) {
  localStorage.setItem('iz_sellers', JSON.stringify(sellers));
}

function addSeller() {
  var name = document.getElementById('sellerName').value;
  var pass = document.getElementById('sellerPass').value;
  
  if(!name || !pass) {
    alert('Заполните имя и пароль');
    return;
  }
  
  var checkboxes = document.querySelectorAll('#shopCheckboxes input[type="checkbox"]:checked');
  var shops = [];
  for(var i = 0; i < checkboxes.length; i++) {
    shops.push(checkboxes[i].value);
  }
  
  if(!shops.length) {
    alert('Выберите хотя бы один магазин');
    return;
  }
  
  var sellers = getSellers();
  sellers.push({
    id: Date.now().toString(),
    name: name,
    shops: shops,
    pass: pass,
    createdAt: new Date().toISOString()
  });
  
  saveSellers(sellers);
  document.getElementById('sellerName').value = '';
  document.getElementById('sellerPass').value = '';
  document.querySelectorAll('#shopCheckboxes input').forEach(cb => cb.checked = false);
  alert('Продавец добавлен!');
  renderSellers();
}

function editSeller(id) {
  var sellers = getSellers();
  var seller = sellers.find(s => s.id === id);
  if(!seller) return;
  
  var checkboxes = document.querySelectorAll('#editShopCheckboxes input[type="checkbox"]');
  checkboxes.forEach(cb => {
    cb.checked = seller.shops.includes(cb.value);
  });
  
  document.getElementById('editSellerModal').style.display = 'block';
  document.getElementById('editSellerModal').dataset.sellerId = id;
  document.getElementById('editSellerName').innerHTML = seller.name;
}

function saveSellerEdit() {
  var sellerId = document.getElementById('editSellerModal').dataset.sellerId;
  var checkboxes = document.querySelectorAll('#editShopCheckboxes input[type="checkbox"]:checked');
  var shops = [];
  for(var i = 0; i < checkboxes.length; i++) {
    shops.push(checkboxes[i].value);
  }
  
  if(!shops.length) {
    alert('Выберите хотя бы один магазин');
    return;
  }
  
  var sellers = getSellers();
  var seller = sellers.find(s => s.id === sellerId);
  if(seller) {
    seller.shops = shops;
    saveSellers(sellers);
    document.getElementById('editSellerModal').style.display = 'none';
    renderSellers();
  }
}

function deleteSeller(id) {
  if(!confirm('Удалить продавца?')) return;
  var sellers = getSellers();
  sellers = sellers.filter(s => s.id !== id);
  saveSellers(sellers);
  renderSellers();
}

function renderSellers() {
  var sellers = getSellers();
  var html = '';
  
  if(sellers.length === 0) {
    html = '<p style="color:var(--t2);font-size:12px">Продавцов нет</p>';
  } else {
    for(var i = 0; i < sellers.length; i++) {
      var s = sellers[i];
      html += '<div style="padding:12px;background:var(--s2);border-radius:8px;margin-bottom:10px">';
      html += '<div style="font-weight:600;margin-bottom:4px">' + s.name + '</div>';
      html += '<div style="font-size:12px;color:var(--t2);margin-bottom:8px">Магазины: ' + s.shops.join(', ') + '</div>';
      html += '<div style="display:flex;gap:8px">';
      html += '<button class="btn" style="flex:1;padding:8px;font-size:12px" onclick="editSeller(\'' + s.id + '\')">Изменить</button>';
      html += '<button class="btn" style="flex:1;padding:8px;font-size:12px;background:var(--exp)" onclick="deleteSeller(\'' + s.id + '\')">Удалить</button>';
      html += '</div>';
      html += '</div>';
    }
  }
  
  var container = document.getElementById('sellersList');
  if(container) {
    container.innerHTML = html;
  }
}

function renderShopCheckboxes() {
  var shops = getShops();
  var html = '';
  for(var i = 0; i < shops.length; i++) {
    html += '<label style="display:flex;align-items:center;gap:8px;padding:8px;cursor:pointer;margin-bottom:8px;background:var(--s2);border-radius:6px">';
    html += '<input type="checkbox" value="' + shops[i] + '" style="width:16px;height:16px;cursor:pointer">';
    html += '<span>' + shops[i] + '</span>';
    html += '</label>';
  }
  
  var addContainer = document.getElementById('shopCheckboxes');
  if(addContainer) addContainer.innerHTML = html;
  
  var editContainer = document.getElementById('editShopCheckboxes');
  if(editContainer) editContainer.innerHTML = html;
}

function selectAdminRole(role, el) {
  selectedRole = role;
  
  // Remove selected from all
  var cards = document.querySelectorAll('.role-card');
  for(var i = 0; i < cards.length; i++) {
    cards[i].classList.remove('selected');
  }
  
  // Add to this one
  if(el) {
    el.classList.add('selected');
  }
  
  // Get users for this role
  var allUsers = getAdminUsers();
  var users = [];
  if(Array.isArray(allUsers)) {
    for(var i = 0; i < allUsers.length; i++) {
      if(allUsers[i] && allUsers[i].role === role) {
        users.push(allUsers[i]);
      }
    }
  }
  
  // Update dropdown
  var loginUserEl = document.getElementById('loginUser');
  if(loginUserEl) {
    var html = '';
    if(users.length > 0) {
      for(var i = 0; i < users.length; i++) {
        var u = users[i];
        html += '<option value="' + (u.id||'') + '">' + (u.name||'User') + '</option>';
      }
    } else {
      html = '<option value="">— нет пользователей —</option>';
    }
    loginUserEl.innerHTML = html;
  }
}

function doLogin() {
  var uid_sel = gv('loginUser');
  var pass = gv('loginPass');
  
  if(!uid_sel) {
    document.getElementById('loginErr').innerHTML = 'Выберите пользователя';
    return;
  }
  
  if(!pass) {
    document.getElementById('loginErr').innerHTML = 'Введите пароль';
    return;
  }
  
  var users = getAdminUsers();
  var user = null;
  for(var i = 0; i < users.length; i++) {
    if(users[i].id === uid_sel) {
      user = users[i];
      break;
    }
  }
  
  if(!user || user.pass !== pass) {
    document.getElementById('loginErr').innerHTML = 'Неверный пароль';
    return;
  }
  
  // Success
  session = {id: user.id, name: user.name, role: user.role};
  sessionStorage.setItem('iz_admin_session', JSON.stringify(session));
  document.getElementById('loginErr').innerHTML = '✅ Вход выполнен!';
  
  // Redirect or show app
  setTimeout(function() {
    alert('Успешный вход как ' + user.name + ' (' + user.role + ')');
  }, 500);
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  // Initialize default shops if not exist
  if(!localStorage.getItem('iz_shops')) {
    localStorage.setItem('iz_shops', JSON.stringify(['Роза Хутор', 'Горки', 'Мастерская']));
  }
  
  // Load initial data
  renderShopCheckboxes();
  renderSellers();
  
  // Select first role
  selectAdminRole('admin', document.querySelectorAll('.role-card')[0]);
});
</script>

</body>
</html>
